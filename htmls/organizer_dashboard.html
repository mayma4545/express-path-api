<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizer Dashboard | Analytics</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Chart.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1DA1F2',
            'primary-dark': '#1a8fd8',
            'primary-light': '#e8f5fd',
            textMain: '#0f172a',
            textMuted: '#64748b'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #f4f8fd; /* Soft light blue/gray background */
      color: var(--textMain); 
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Glassmorphism Classes */
    .glass-panel {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(29, 161, 242, 0.15); /* Subtle blue border */
      box-shadow: 0 10px 40px -10px rgba(29, 161, 242, 0.1);
      border-radius: 24px;
    }
  </style>
</head>
<body class="p-6 md:p-10 lg:p-12 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="mb-10 max-w-6xl mx-auto w-full">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-2">Organizer Dashboard</h1>
    <p class="text-textMuted font-medium text-lg">Program & Events Navigator Analytics</p>
  </header>

  <!-- Main Layout (Stacked mobile, 2:1 ratio desktop) -->
  <main class="max-w-6xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-8 flex-grow">
    
    <!-- Left Column: Analytical Column Bar Graph (2 parts) -->
    <div class="lg:col-span-2 glass-panel p-6 md:p-8 flex flex-col h-full min-h-[400px]">
      <div class="mb-6">
        <h2 class="text-xl font-bold text-textMain">Venue Popularity</h2>
        <p class="text-sm text-textMuted mt-1">Total Navigation Hits via A* Algorithm Routing</p>
      </div>
      
      <!-- Chart Container -->
      <div class="flex-grow relative w-full h-full min-h-[300px]">
        <canvas id="venueTrafficChart"></canvas>
      </div>
    </div>

    <!-- Right Column: Side-by-Side KPI Metrics (1 part) -->
    <div class="lg:col-span-1 flex flex-col gap-8">
      
      <!-- KPI 1: Peak Traffic Time -->
      <div class="glass-panel p-6 md:p-8 flex-1 flex flex-col justify-center relative overflow-hidden group">
        <!-- Decorative subtle background glow -->
        <div class="absolute -right-6 -top-6 w-24 h-24 bg-primary rounded-full opacity-10 blur-2xl group-hover:opacity-20 transition-opacity"></div>
        
        <div class="w-14 h-14 rounded-2xl bg-primary-light text-primary flex items-center justify-center mb-6 shadow-sm">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h3 class="text-textMuted text-xs font-bold uppercase tracking-widest mb-2">Peak Traffic Time</h3>
        
        <!-- Later this can be replaced by Django tag: {{ peak_time }} -->
        <p class="text-4xl md:text-5xl font-extrabold text-textMain tracking-tight">7:00 <span class="text-2xl text-textMuted">PM</span></p>
        <p class="text-sm text-primary mt-3 font-semibold bg-primary/10 inline-block px-3 py-1 rounded-full self-start">during Fiestas</p>
      </div>

      <!-- KPI 2: Success Rate -->
      <div class="glass-panel p-6 md:p-8 flex-1 flex flex-col justify-center relative overflow-hidden group">
        <div class="absolute -right-6 -top-6 w-24 h-24 bg-green-500 rounded-full opacity-10 blur-2xl group-hover:opacity-20 transition-opacity"></div>

        <div class="w-14 h-14 rounded-2xl bg-green-50 text-green-500 flex items-center justify-center mb-6 shadow-sm">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h3 class="text-textMuted text-xs font-bold uppercase tracking-widest mb-2">Success Rate</h3>
        
        <!-- Later this can be replaced by Django tag: {{ success_rate }} -->
        <p class="text-4xl md:text-5xl font-extrabold text-textMain tracking-tight">94.2<span class="text-2xl text-textMuted">%</span></p>
        <p class="text-sm text-green-600 mt-3 font-medium">Successfully reached venue entrance</p>
      </div>

    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Set default Chart.js fonts
      Chart.defaults.font.family = "'Inter', sans-serif";
      Chart.defaults.color = '#64748b';

      const ctx = document.getElementById('venueTrafficChart').getContext('2d');
      
      // Dynamic Data: Can easily be replaced with Django Template Tags later
      // Example: const labels = {{ venue_labels|safe }};
      const labels = ['City Plaza', 'Osmeña College', 'Social Center', 'MNCHS', 'Fish Port'];
      
      // Example: const dataPoints = {{ venue_hits|safe }};
      const dataPoints = [3240, 1850, 2430, 950, 1120];

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Navigation Hits',
            data: dataPoints,
            backgroundColor: '#1DA1F2', // Primary Blue
            hoverBackgroundColor: '#1a8fd8', // Primary Dark
            borderRadius: 8, // Rounded corners on bars
            borderSkipped: false,
            barThickness: 'flex',
            maxBarThickness: 48
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { 
              display: false // Hide legend to keep it clean
            },
            tooltip: {
              backgroundColor: '#0f172a',
              padding: 14,
              cornerRadius: 12,
              titleFont: { size: 14, weight: 'bold' },
              bodyFont: { size: 14 },
              displayColors: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { 
                color: 'rgba(0,0,0,0.04)',
                drawBorder: false,
                tickLength: 0
              },
              border: { display: false },
              ticks: { padding: 10 }
            },
            x: {
              grid: { 
                display: false,
                drawBorder: false 
              },
              border: { display: false },
              ticks: { 
                padding: 10,
                font: { weight: '500' }
              }
            }
          }
        }
      });
    });
  </script>
</body>
</html>
